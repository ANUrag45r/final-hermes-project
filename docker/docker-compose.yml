services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      # Switch to Postgres + Qdrant for the full production memory stack.
      DATABASE_URL: postgresql+psycopg2://gbrain:gbrain@db:5432/governance
      VECTOR_BACKEND: local        # set to "qdrant" once a QdrantVectorStore is wired
      QDRANT_URL: http://qdrant:6333
      # --- Hermes: the only configurable intelligence dependency ---
      HERMES_PROVIDER: local       # local | hermes | openai | ollama
      HERMES_BASE_URL: http://hermes:8088
      HERMES_MODEL: hermes-default
      # HERMES_API_KEY: ${HERMES_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - qdrant

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gbrain
      POSTGRES_PASSWORD: gbrain
      POSTGRES_DB: governance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./vector_db/qdrant_storage:/qdrant/storage

volumes:
  pgdata:
